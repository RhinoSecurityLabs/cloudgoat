---
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    exclude-paths:
      - "cloudgoat/scenarios/**"
    schedule:
      interval: "daily"
      day: "sunday"
      time: "01:00"
      timezone: "UTC"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
